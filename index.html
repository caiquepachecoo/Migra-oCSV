<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Time de Migração CSV</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: #0b0b0d;
    color: #eaeaea;
}

/* HEADER */
.header {
    background: linear-gradient(90deg, #ff5a00, #ff2d2d);
    padding: 20px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
    letter-spacing: 1px;
}

/* CONTAINER */
.container {
    max-width: 1000px;
    margin: 30px auto;
    background: #151518;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 0 20px rgba(0,0,0,0.4);
}

/* TITLES */
h3 {
    margin-bottom: 10px;
    color: #ff5a00;
}

/* INPUTS */
input {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #2a2a2e;
    background: #1e1e22;
    color: white;
    margin-bottom: 10px;
    transition: 0.2s;
}

input:focus {
    outline: none;
    border-color: #ff5a00;
    box-shadow: 0 0 5px rgba(255,90,0,0.4);
}

/* BUTTONS */
button {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
    transition: 0.2s;
}

button:hover {
    transform: translateY(-1px);
    opacity: 0.95;
}

.primary {
    background: linear-gradient(90deg, #ff5a00, #ff2d2d);
    color: white;
}

.secondary {
    background: #2a2a2e;
    color: #ccc;
}

.small {
    padding: 6px 10px;
    font-size: 12px;
    width: auto;
}

/* TABLE */
table {
    width: 100%;
    margin-top: 25px;
    border-collapse: collapse;
    border-radius: 10px;
    overflow: hidden;
}

thead {
    background: #1f1f23;
}

th {
    padding: 12px;
    font-size: 13px;
    text-align: left;
    color: #ff5a00;
}

td {
    padding: 10px;
    border-top: 1px solid #2a2a2e;
    font-size: 13px;
}

tr:hover {
    background: #1c1c20;
}

/* DIVIDER */
hr {
    border: none;
    height: 1px;
    background: #2a2a2e;
    margin: 20px 0;
}
</style>
</head>

<body>

<div class="header">
Time de Migração CSV
</div>

<div class="container">

<h3>Módulo</h3>
<input id="modulo" placeholder="Nome do módulo">

<hr>

<h3>Aula</h3>
<input id="aula" placeholder="Nome da aula">

<input id="conteudo" placeholder="Conteúdo (opcional)">
<input id="anexos" placeholder="Anexos (opcional)">

<button class="primary" onclick="adicionar()">Adicionar ao CSV</button>
<button class="primary" onclick="baixarCSV()">Baixar CSV Final</button>
<button class="secondary" onclick="limparTudo()">Limpar Tudo</button>

<table>
<thead>
<tr>
<th>Módulo</th>
<th>Aula</th>
<th>Conteúdo</th>
<th>Vídeo</th>
<th>Anexos</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

</div>

<script>

let linhas = [];
let editandoIndex = null;

function adicionar() {

    const modulo = document.getElementById("modulo").value;
    const aula = document.getElementById("aula").value;
    const conteudo = document.getElementById("conteudo").value;
    const anexos = document.getElementById("anexos").value;

    if (!modulo || !aula) {
        alert("Preencha módulo e aula!");
        return;
    }

    linhas.push({
        modulo,
        aula,
        conteudo,
        video: aula + ".mp4",
        anexos
    });

    document.getElementById("aula").value = "";
    document.getElementById("conteudo").value = "";
    document.getElementById("anexos").value = "";

    render();
}

function render() {

    const tbody = document.getElementById("lista");
    tbody.innerHTML = "";

    linhas.forEach((l, i) => {

        if (editandoIndex === i) {
            tbody.innerHTML += `
            <tr>
                <td><input id="edit_mod_${i}" value="${l.modulo}"></td>
                <td><input id="edit_aula_${i}" value="${l.aula}"></td>
                <td><input id="edit_cont_${i}" value="${l.conteudo || ""}"></td>
                <td>${l.aula}.mp4</td>
                <td><input id="edit_anex_${i}" value="${l.anexos || ""}"></td>
                <td>
                    <button class="small primary" onclick="salvarEdicao(${i})">Salvar</button>
                </td>
            </tr>
            `;
        } else {
            tbody.innerHTML += `
            <tr>
                <td>${l.modulo}</td>
                <td>${l.aula}</td>
                <td>${l.conteudo || ""}</td>
                <td>${l.video}</td>
                <td>${l.anexos || ""}</td>
                <td>
                    <button class="small secondary" onclick="editar(${i})">Editar</button>
                </td>
            </tr>
            `;
        }

    });
}

function editar(index) {
    editandoIndex = index;
    render();
}

function salvarEdicao(index) {

    const modulo = document.getElementById(`edit_mod_${index}`).value;
    const aula = document.getElementById(`edit_aula_${index}`).value;
    const conteudo = document.getElementById(`edit_cont_${index}`).value;
    const anexos = document.getElementById(`edit_anex_${index}`).value;

    linhas[index] = {
        modulo,
        aula,
        conteudo,
        video: aula + ".mp4",
        anexos
    };

    editandoIndex = null;
    render();
}

function limparTudo() {

    const confirmar = confirm("Tem certeza que deseja apagar tudo?");

    if (!confirmar) return;

    linhas = [];
    render();
}

function baixarCSV() {

    let csv = "Modulo;Aula;Conteudo;Videos;Anexos\n";

    linhas.forEach(l => {
        csv += `"${l.modulo}";"${l.aula}";"${l.conteudo || ""}";"${l.video}";"${l.anexos || ""}"\n`;
    });

    const BOM = "\uFEFF";

    const blob = new Blob([BOM + csv], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);

    const link = document.createElement("a");
    link.setAttribute("href", url);
    link.setAttribute("download", "time_migracao_csv.csv");

    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);

    URL.revokeObjectURL(url);
}

</script>

</body>
</html>
